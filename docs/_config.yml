title: MCP Dataverse
description: The most complete MCP server for Microsoft Dataverse — 63 tools, zero config auth
url: https://codeurali.github.io
baseurl: /mcp-dataverse

remote_theme: just-the-docs/just-the-docs@v0.10.1

color_scheme: dark

logo: /assets/logo.webp

aux_links:
  "npm":
    - "https://www.npmjs.com/package/mcp-dataverse"
  "GitHub":
    - "https://github.com/codeurali/mcp-dataverse"

aux_links_new_tab: true

heading_anchors: true

search_enabled: true
search:
  heading_level: 3
  previews: 3

nav_enabled: true

permalink: pretty

exclude:
  - node_modules/
  - coverage/
  - debug/
  - tests/
  - _bmad/
  - _bmad-output/
  - mcp-template/
  - autoparc/

footer_content: "MIT License &copy; <a href=\"https://www.linkedin.com/in/alitaggaz/\">Ali Taggaz</a>. Built with <a href=\"https://just-the-docs.com\">Just the Docs</a>."

callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

back_to_top: true
back_to_top_text: "Back to top"

ga_tracking: null
